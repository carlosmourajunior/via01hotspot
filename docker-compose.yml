services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      SERVER_URL: http://localhost:8081
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-mude-esta-chave}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@evolution-db:5432/evolution?schema=evolution_api
      CACHE_REDIS_ENABLED: "false"
      LOG_LEVEL: ERROR
    depends_on:
      - evolution-db
    volumes:
      - evolution_instances:/evolution/instances

  evolution-db:
    image: postgres:15-alpine
    container_name: evolution-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data

volumes:
  evolution_instances:
  evolution_pgdata:
