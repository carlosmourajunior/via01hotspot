services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      SERVER_URL: http://localhost:8081
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-mude-esta-chave}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@evolution-db:5432/evolution?schema=evolution_api
      CACHE_REDIS_ENABLED: "false"
      LOG_LEVEL: ERROR
    depends_on:
      - evolution-db
    volumes:
      - evolution_instances:/evolution/instances

  evolution-db:
    image: postgres:15-alpine
    container_name: evolution-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data

  # Backend Node legado — mantido só para rollback:
  #   docker compose --profile legacy up -d backend  (e devolver o mapeamento "80:3000")
  backend:
    profiles: ["legacy"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hotspot-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Dentro da rede do Docker Compose, o Evolution API é acessível
      # pelo nome do serviço e pela porta interna (não a porta 8081 do host).
      EVOLUTION_URL: http://evolution-api:8080
      PORT: 3000
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - evolution-api

  # ── Área administrativa unificada (FastAPI + Postgres) ──────────
  db:
    image: postgres:16-alpine
    container_name: controle-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: controle
      POSTGRES_USER: controle
      POSTGRES_PASSWORD: controle
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U controle"]
      interval: 5s
      timeout: 5s
      retries: 10

  admin:
    build:
      context: .
      dockerfile: backend-py/Dockerfile
    container_name: admin-backend
    restart: unless-stopped
    # 8082 no host: a 8080 é a porta de inform da controladora UniFi neste servidor
    ports:
      - "8082:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://controle:controle@db:5432/controle
      # Evolution API pelo nome do serviço na rede interna do compose
      EVOLUTION_URL: http://evolution-api:8080
    volumes:
      - ./backend-py/uploads:/app/uploads
      # jsonl do backend Node, para o script de importação de guests
      - ./backend/data:/hotspot-data:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Portal captivo em FastAPI (porta 80 — usada pelo redirect do UniFi) ──
  portal:
    build:
      context: .
      dockerfile: backend-py/Dockerfile
    container_name: portal-backend
    restart: unless-stopped
    command: ["uvicorn", "portal:app", "--host", "0.0.0.0", "--port", "3000"]
    ports:
      - "80:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://controle:controle@db:5432/controle
      # Dentro da rede do compose, a Evolution API é acessível pelo
      # nome do serviço e pela porta interna (não a 8081 do host).
      EVOLUTION_URL: http://evolution-api:8080
    depends_on:
      db:
        condition: service_healthy
      evolution-api:
        condition: service_started

volumes:
  evolution_instances:
  evolution_pgdata:
  pgdata:
