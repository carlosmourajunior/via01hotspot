services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      SERVER_URL: http://localhost:8081
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-mude-esta-chave}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@evolution-db:5432/evolution?schema=evolution_api
      CACHE_REDIS_ENABLED: "false"
      LOG_LEVEL: ERROR
    depends_on:
      - evolution-db
    volumes:
      - evolution_instances:/evolution/instances

  evolution-db:
    image: postgres:15-alpine
    container_name: evolution-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hotspot-backend
    restart: unless-stopped
    ports:
      - "80:3000"
    env_file:
      - ./backend/.env
    environment:
      # Dentro da rede do Docker Compose, o Evolution API é acessível
      # pelo nome do serviço e pela porta interna (não a porta 8081 do host).
      EVOLUTION_URL: http://evolution-api:8080
      PORT: 3000
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - evolution-api

volumes:
  evolution_instances:
  evolution_pgdata:
