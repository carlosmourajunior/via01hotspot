name: Build e publica imagem (GHCR)

# Ao dar push/merge em main, builda a imagem única do projeto (backend-py/Dockerfile,
# que já compila os dois frontends) e publica no GitHub Container Registry.
# O deploy no servidor é feito pelo Watchtower, que observa a tag :latest.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  # owner/repo — o GHCR exige tudo em minúsculas (normalizado no step "prep")
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normaliza o nome da imagem para minúsculas
        id: prep
        run: echo "image=${IMAGE_PREFIX,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Imagem única: os serviços "admin" e "portal" usam a mesma, mudando só
      # o CMD (o portal sobrescreve com "uvicorn portal:app").
      # Context na raiz porque o Dockerfile copia backend-py/, frontend-admin/
      # e frontend-portal/. Plataforma amd64: o servidor do hotspot é x86-64.
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend-py/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.prep.outputs.image }}:latest
            ${{ env.REGISTRY }}/${{ steps.prep.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
